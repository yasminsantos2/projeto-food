services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=32213115
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  eureka-server:
    build: ./server/server
    container_name: eureka-server
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    build: ./gateway/gateway_
    container_name: gateway
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8081/eureka
    depends_on:
      eureka-server:
        condition: service_started

  pagamentos-ms:
    build: ./pagamentos
    container_name: pagamentos-ms
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/food_pagamento
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=32213115
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8081/eureka
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started

  pedidos-ms:
    build: ./pedidos/pedidos
    ports:
      - "8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/food_pedidos
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=32213115
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8081/eureka
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
